services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: dating
      POSTGRES_PASSWORD: dating
      POSTGRES_DB: dating
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dating -d dating"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data

  minio-init:
    image: minio/mc:latest
    depends_on:
      - minio
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        sleep 8;
        mc alias set local http://minio:9000 minioadmin minioadmin;
        mc mb local/dating-media --ignore-existing || true;
        mc anonymous set download local/dating-media || true

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      DATING_DATABASE_URL: postgresql+asyncpg://dating:dating@postgres:5432/dating
      DATING_REDIS_URL: redis://redis:6379/0
      DATING_S3_ENDPOINT_URL: http://minio:9000
      DATING_S3_PRESIGN_ENDPOINT_URL: http://localhost:8080
      DATING_S3_ACCESS_KEY: minioadmin
      DATING_S3_SECRET_KEY: minioadmin
      DATING_S3_BUCKET: dating-media
      DATING_S3_ADDRESSING_STYLE: path
      DATING_S3_NGINX_DEV_GATEWAY_URL: http://localhost:8080
      DATING_CDN_PUBLIC_BASE_URL: http://localhost:8080/s3/dating-media
      DATING_JWT_SECRET: dev-jwt-secret-change-in-production-min-32-chars
      DATING_CORS_ORIGINS: http://localhost:5173,http://127.0.0.1:5173,http://localhost:3000,http://localhost:8080
      DATING_TRUSTED_HOSTS: localhost,127.0.0.1,api,nginx
      DATING_TELEGRAM_BOT_USERNAME: ""
      DATING_TELEGRAM_BOT_TOKEN: ""
      DATING_TBANK_TERMINAL_KEY: ""
      DATING_TBANK_PASSWORD: ""
      DATING_TBANK_WEBHOOK_SECRET: ""
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started
      minio-init:
        condition: service_completed_successfully

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile.worker
    environment:
      DATING_DATABASE_URL: postgresql+asyncpg://dating:dating@postgres:5432/dating
      DATING_REDIS_URL: redis://redis:6379/0
      DATING_JWT_SECRET: dev-jwt-secret-change-in-production-min-32-chars
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    ports:
      - "5173:80"
    depends_on:
      - api

  nginx:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api
      - web
      - minio

volumes:
  pgdata:
  miniodata:
