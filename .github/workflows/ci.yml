name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: dating
          POSTGRES_PASSWORD: dating
          POSTGRES_DB: dating
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U dating -d dating"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install
        run: pip install -r requirements.txt
      - name: Ruff
        run: ruff check app tests
      - name: Alembic upgrade
        env:
          DATING_DATABASE_URL: postgresql+asyncpg://dating:dating@localhost:5432/dating
          DATING_REDIS_URL: redis://localhost:6379/0
          DATING_JWT_SECRET: ci-test-secret-at-least-32-characters-long
        run: alembic upgrade head
      - name: Seed
        env:
          DATING_DATABASE_URL: postgresql+asyncpg://dating:dating@localhost:5432/dating
          DATING_REDIS_URL: redis://localhost:6379/0
          DATING_JWT_SECRET: ci-test-secret-at-least-32-characters-long
        run: python -m app.seed
      - name: Pytest
        env:
          DATING_DATABASE_URL: postgresql+asyncpg://dating:dating@localhost:5432/dating
          DATING_REDIS_URL: redis://localhost:6379/0
          DATING_JWT_SECRET: ci-test-secret-at-least-32-characters-long
        run: pytest -q

  docker-images:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Login to Yandex Container Registry
        shell: bash
        run: |
          echo "${{ secrets.YC_API_KEY }}" | docker login \
            --username api_key \
            --password-stdin \
            cr.yandex/${{ secrets.REGISTRY_DOCKER_ID }}
      - name: Docker meta API
        id: meta-api
        uses: docker/metadata-action@v6
        with:
          images: dating-api
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-
            type=ref,event=pr
      - name: Build API image
        uses: docker/build-push-action@v7
        with:
          context: backend
          file: backend/Dockerfile
          push: false
          tags: ${{ steps.meta-api.outputs.tags }}
          labels: ${{ steps.meta-api.outputs.labels }}
          cache-from: type=registry,ref=cr.yandex/${{ secrets.REGISTRY_DOCKER_ID }}/dating-api:cache
          cache-to: type=registry,ref=cr.yandex/${{ secrets.REGISTRY_DOCKER_ID }}/dating-api:cache,mode=max
      - name: Docker meta Worker
        id: meta-worker
        uses: docker/metadata-action@v6
        with:
          images: dating-worker
          tags: |
            type=raw,value=latest
            type=sha,prefix=
            type=ref,event=pr
      - name: Build worker image
        uses: docker/build-push-action@v7
        with:
          context: backend
          file: backend/Dockerfile.worker
          push: false
          tags: ${{ steps.meta-worker.outputs.tags }}
          labels: ${{ steps.meta-worker.outputs.labels }}
          cache-from: type=registry,ref=cr.yandex/${{ secrets.REGISTRY_DOCKER_ID }}/dating-worker:cache
          cache-to: type=registry,ref=cr.yandex/${{ secrets.REGISTRY_DOCKER_ID }}/dating-worker:cache,mode=max

  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json
      # npm ci: строго по lockfile, быстрее и предсказуемее чем npm install в CI
      - run: npm ci
      - name: Build
        env:
          VITE_API_BASE_URL: http://localhost:8000
        run: npm run build
      - name: Archive Web Dist
        run: tar -czf web-dist.tar.gz dist/
      - name: Compute SHA256
        shell: bash
        run: |
          SHA256=$(openssl dgst -sha256 "web-dist.tar.gz" | awk '{print $2}')
          echo "FILE_SHA256=${SHA256}" >> $GITHUB_ENV
      - name: Upload to YC Registry
        shell: bash
        run: |
          curl \
            --fail \
            --request PUT \
            --user "api_key:${{ secrets.YC_API_KEY }}" \
            --header "X-Checksum-SHA256: ${FILE_SHA256}" \
            --upload-file "web-dist.tar.gz" \
          "https://registry.yandexcloud.net/binaries/${{ secrets.REGISTRY_WEB_ARCHIVE }}/frontend/${{ github.sha }}/web-dist.tar.gz"

      - name: Summary
        shell: bash
        run: |
          echo "### ✅ Binary uploaded to YC Registry" >> $GITHUB_STEP_SUMMARY
          echo "- **Artifact:** \`frontend\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Version:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **File:** \`web-dist.tar.gz\`" >> $GITHUB_STEP_SUMMARY
          echo "- **SHA256:** \`${FILE_SHA256}\`" >> $GITHUB_STEP_SUMMARY
