# http context (this file is included from /etc/nginx/nginx.conf under http { }).
# Preserve X-Forwarded-Proto from an outer TLS terminator; else use direct $scheme.
map $http_x_forwarded_proto $dating_forwarded_proto {
    default $http_x_forwarded_proto;
    ''      $scheme;
}

server {
    listen 80;
    server_name _;

    client_max_body_size 10M;

    # S3/MinIO path-style: presigned URLs from API use http://localhost:8080/s3/... (see DATING_S3_PRESIGN_ENDPOINT_URL).
    location /s3/ {
        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin * always;
            add_header Access-Control-Allow-Methods "GET, PUT, POST, HEAD, DELETE" always;
            add_header Access-Control-Allow-Headers "*" always;
            add_header Access-Control-Max-Age 3600 always;
            add_header Content-Length 0;
            return 204;
        }
        rewrite ^/s3/(.*) /$1 break;
        proxy_pass http://minio:9000;
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Presigned upload target (path-style): /<bucket>/<key>
    location /dating-media/ {
        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin * always;
            add_header Access-Control-Allow-Methods "GET, PUT, POST, HEAD, DELETE" always;
            add_header Access-Control-Allow-Headers "*" always;
            add_header Access-Control-Max-Age 3600 always;
            add_header Content-Length 0;
            return 204;
        }
        proxy_pass http://minio:9000;
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/ {
        proxy_pass http://api:8000;
        proxy_http_version 1.1;
        # TrustedHostMiddleware sees this value — must match DATING_TRUSTED_HOSTS (e.g. "api").
        # Public Host stays in X-Forwarded-Host for apps that need it.
        proxy_set_header Host api;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $dating_forwarded_proto;
        proxy_set_header X-Forwarded-Host $http_host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    location /health {
        proxy_pass http://api:8000/health;
        proxy_http_version 1.1;
        proxy_set_header Host api;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $dating_forwarded_proto;
        proxy_set_header X-Forwarded-Host $http_host;
    }

    location /ready {
        proxy_pass http://api:8000/ready;
        proxy_http_version 1.1;
        proxy_set_header Host api;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $dating_forwarded_proto;
        proxy_set_header X-Forwarded-Host $http_host;
    }

    location / {
        proxy_pass http://web:80;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $dating_forwarded_proto;
    }
}
