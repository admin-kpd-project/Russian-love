# http context (this file is included from /etc/nginx/nginx.conf under http { }).
# Preserve X-Forwarded-Proto from an outer TLS terminator; else use direct $scheme.
map $http_x_forwarded_proto $dating_forwarded_proto {
    default $http_x_forwarded_proto;
    '' $scheme;
}

map $uri $media_cache_control {
    ~^/dating-media/ "public, max-age=31536000, immutable";
    default "";
}

# Send "Connection: upgrade" only for actual WebSocket upgrades; close otherwise.
map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
}

server {
    listen 80;
    server_name _;
    server_tokens off;

    client_max_body_size 10M;
    proxy_http_version 1.1; # Inherited by all locations

    resolver 127.0.0.11 valid=10s;

    # ── MinIO / S3 Storage ───────────────────────────────────────────────
    location ~ ^/(s3|dating-media)/ {
        limit_except GET PUT POST HEAD DELETE OPTIONS {
            deny all;
        }
        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin * always;
            add_header Access-Control-Allow-Methods "GET, PUT, POST, HEAD, DELETE" always;
            add_header Access-Control-Allow-Headers "*" always;
            add_header Access-Control-Max-Age 86400 always;
            add_header Content-Length 0;
            return 204;
        }

        client_max_body_size 250M;

        rewrite ^/s3/(.*) /$1 break;

        proxy_pass http://minio:9000;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_buffering on;
        proxy_buffer_size 16k;
        proxy_buffers 8 32k;
        add_header Cache-Control $media_cache_control;
        add_header Access-Control-Allow-Origin * always;
    }

    # ── Backend API & Health ─────────────────────────────────────────────
    location ~ ^/(api|health|ready)/ {
        proxy_pass http://api:8000;
        proxy_set_header Host api;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $dating_forwarded_proto;
        proxy_set_header X-Forwarded-Host $http_host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        proxy_connect_timeout 10s;
        proxy_send_timeout 60s;
        proxy_read_timeout 300s;
    }

    # ── Web Frontend ─────────────────────────────────────────────────────
    location / {
        proxy_pass http://web:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $dating_forwarded_proto;

        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    }
}
